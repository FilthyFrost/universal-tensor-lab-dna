                    addVec(out, sign * ease * 2.6, -ease * 0.58 + hinge * 0.22, -Math.abs(localZ) * ease * 1.1, p);
                } else if (primitive === 'wideRibbonBand') {
                    const ribbonWave = Math.sin(localZ * 10) * ease * 0.22;
                    addVec(out, sign * ease * 3.65, -ease * 0.34 + ribbonWave, localZ * ease * 0.72, p);
                } else {
                    addVec(out, sign * ease * params.sx * 1.35, ease * params.sy * 1.35, localZ * Math.sin(ease * Math.PI) * params.sz * 1.35, p);
                    if (params.web !== 0) {
                        const web = Math.abs(Math.sin(localZ * 8.0)) * params.web;
                        out.dx -= sign * web * Math.pow(ease, 2.0) * 1.35;
                    }
                }
            }

            return out;
        }

        function applyBackBlueprint(x, y, z, baseY, code, params, nx, ny, nz, zNorm, headCode) {
            const out = { dx: 0, dy: 0, dz: 0, disp: 0 };
            if (baseY <= 0 || code === 'AA') return out;

            const primitive = DORSAL_PRIMITIVES[code] || params.type;
            const headClear = frontClearance(z, headCode);
            const clear = needsHeadClearance(headCode) ? headClear : 1;
            const dC = Math.hypot(x * 0.92, y - 0.5, z + 0.22);
            const pC = smoothStep(0.98, 0.0, dC) * clear;
            const center = smoothStep(0.46, 0.0, Math.abs(x));
            const narrow = smoothStep(0.24, 0.0, Math.abs(x));
            const spineBand = smoothStep(-0.95, -0.18, z) * smoothStep(0.62, -0.08, z) * clear;
            const fullBand = smoothStep(-1.0, -0.25, z) * smoothStep(0.72, -0.04, z) * clear;

            if (primitive === 'bulbCluster' && pC > 0) {
                const bulbs = [
                    ellipsoidField(x, y, z, 0.0, 0.82, -0.28, 0.36, 0.36, 0.32),
                    ellipsoidField(x, y, z, 0.34, 0.76, -0.42, 0.3, 0.34, 0.3),
                    ellipsoidField(x, y, z, -0.34, 0.76, -0.42, 0.3, 0.34, 0.3),
                    ellipsoidField(x, y, z, 0.26, 0.84, 0.02, 0.28, 0.34, 0.28),
                    ellipsoidField(x, y, z, -0.26, 0.84, 0.02, 0.28, 0.34, 0.28)
                ];
                const p = Math.max(...bulbs) * clear;
                const groove = 1 + Math.abs(Math.sin(Math.atan2(x, z + 0.26) * 7)) * 0.22;
                const ease = Math.pow(p, 0.72) * groove;
                addVec(out, nx * ease * 1.32, ny * ease * 1.18 + ease * 1.0, nz * ease * 1.05, p);
            } else if (primitive === 'craterMound' && pC > 0) {
                const craterDist = Math.hypot(x * 1.35, z + 0.18);
                const mound = pC;
                const rim = smoothStep(0.54, 0.32, craterDist) * smoothStep(0.08, 0.28, craterDist) * clear;
                const vent = smoothStep(0.22, 0.0, craterDist) * pC;
                addVec(out, nx * mound * 0.9 + x * rim * 0.44, mound * 1.1 + rim * 2.9 - vent * 1.65, nz * mound * 0.72 + (z + 0.18) * rim * 0.4, Math.max(mound, rim));
            } else if (primitive === 'branchingCoral') {
                const dS = Math.abs(x);
                if (dS < 0.74 && z > -0.94 && z < 0.58) {
                    const trunk = smoothStep(0.2, 0.0, dS) * fullBand;
                    const branchMask = Math.max(0, Math.sin(Math.abs(x) * 18 + z * 7) * Math.cos(z * 16) + Math.sin(y * 28) * 0.35);
                    const branch = Math.pow(branchMask, 1.3) * smoothStep(0.74, 0.08, dS) * fullBand;
                    const ease = trunk * 1.2 + branch * 2.15;
                    addVec(out, nx * ease * 0.9 + Math.sign(x || 1) * branch * 0.28, ease * 2.15, nz * ease * 0.85, Math.max(trunk, branch));
                }
            } else if (primitive === 'sineDorsalFin') {
                const p = narrow * fullBand;
                const finWave = 0.55 + 0.45 * Math.sin((z + 0.82) * 8.2);
                const rib = Math.abs(Math.sin((z + 0.65) * 22)) * p;
                addVec(out, Math.sin(z * 7.5) * p * 0.22, p * (2.2 + finWave * 1.15) + rib * 0.34, -p * 0.18, p);
            } else if (primitive === 'sharpPlateRow' || primitive === 'stegosaurusPlates') {
                const rhythm = primitive === 'stegosaurusPlates' ? 3.0 : 4.8;
                const plateRhythm = Math.pow(Math.max(0, Math.sin((z + 0.92) * Math.PI * rhythm)), primitive === 'stegosaurusPlates' ? 0.88 : 1.22);
                const p = narrow * fullBand * plateRhythm;
                const lean = Math.sin((z + 0.4) * 9) * p * 0.32;
                addVec(out, nx * p * (primitive === 'stegosaurusPlates' ? 0.88 : 0.42) + lean, p * (primitive === 'stegosaurusPlates' ? 3.45 : 2.85), nz * p * 0.36 - p * 0.08, p);
            } else if (primitive === 'mushroomCap') {
                const cap = ellipsoidField(x, y, z, 0, 0.82, -0.2, 0.72, 0.52, 0.64) * clear;
                const umbrella = Math.pow(cap, 0.54);
                const radial = Math.hypot(x * 0.9, z + 0.2);
                const scallop = 0.78 + Math.abs(Math.sin(Math.atan2(x, z + 0.2) * 9)) * 0.42;
                const brim = smoothStep(0.2, 0.76, radial) * cap;
                const underside = smoothStep(0.22, -0.14, y - 0.58) * brim;
                addVec(out, x * umbrella * 2.45 * scallop, umbrella * 1.55 - brim * 0.68 - underside * 0.32, (z + 0.2) * umbrella * 2.05 * scallop, cap);
            } else if (primitive === 'crystalVein') {
                const shardRhythm = Math.max(0, Math.sin((z + 0.88) * 18) + Math.cos(x * 14) * 0.35 - 0.18);
                const b = Math.pow(shardRhythm, 2.1) * smoothStep(0.36, 0.0, Math.abs(x)) * fullBand;
                addVec(out, nx * b * 1.48 + Math.sign(x || 1) * b * 0.18, b * 3.05, nz * b * 1.36, b);
            } else if (primitive === 'fluffPuffs') {
                const rowA = Math.max(
                    ellipsoidField(x, y, z, 0.22, 0.84, -0.58, 0.18, 0.42, 0.22),
                    ellipsoidField(x, y, z, -0.22, 0.84, -0.58, 0.18, 0.42, 0.22),
                    ellipsoidField(x, y, z, 0.3, 0.9, -0.18, 0.2, 0.44, 0.24),
                    ellipsoidField(x, y, z, -0.3, 0.9, -0.18, 0.2, 0.44, 0.24),
                    ellipsoidField(x, y, z, 0.18, 0.86, 0.24, 0.18, 0.4, 0.2),
                    ellipsoidField(x, y, z, -0.18, 0.86, 0.24, 0.18, 0.4, 0.2)
                ) * clear;
                const tendril = rowA * (0.72 + Math.abs(Math.sin((x + z) * 18)) * 0.52);
                addVec(out, nx * tendril * 1.3 + x * tendril * 0.42, tendril * 2.55, nz * tendril * 1.2, tendril);
            } else if (primitive === 'shellCap') {
                const p = pC * smoothStep(-0.82, 0.28, z);
                const edge = smoothStep(0.48, 0.82, Math.abs(x)) * p + smoothStep(0.48, 0.85, Math.abs(z + 0.18)) * p;
                const grooves = 1.0 + Math.abs(Math.sin(x * 13)) * 0.32 + Math.abs(Math.sin((z + 0.2) * 10)) * 0.12;

            } else if (primitive === 'singleBackHorn') {
                const p = ellipsoidField(x, y, z, 0, 0.68, -0.1, 0.2, 0.36, 0.38) * clear;
                const sharp = Math.pow(p, 1.95);
                addVec(out, Math.sin(z * 5) * sharp * 0.16, sharp * 3.45, -sharp * 1.15, p);
            } else if (primitive === 'dualSpikeRows') {
                const row = Math.max(
                    ellipsoidField(x, y, z, 0.28, 0.84, -0.15, 0.14, 0.52, 0.78),
                    ellipsoidField(x, y, z, -0.28, 0.84, -0.15, 0.14, 0.52, 0.78)
                ) * fullBand;
                const tooth = Math.pow(0.2 + 0.8 * Math.abs(Math.sin((z + 0.76) * 17)), 1.65);
                const p = row * tooth;
                addVec(out, nx * p * 0.74 + Math.sin(z * 13) * p * 0.12, p * 3.95, nz * p * 0.58 - p * 0.26, p);
            } else if (primitive === 'softRidgeCrest') {
                const p = center * fullBand * (0.45 + 0.55 * Math.abs(Math.sin(z * 6.8)));
                const sway = Math.sin((z + 0.2) * 9) * p;
                addVec(out, sway * 0.48, p * 2.38, sway * 0.32, p);
            } else if (primitive === 'bubbleCluster') {
                const rows = Math.max(
                    ellipsoidField(x, y, z, 0.26, 0.78, -0.54, 0.28, 0.48, 0.28),
                    ellipsoidField(x, y, z, -0.26, 0.78, -0.54, 0.28, 0.48, 0.28),
                    ellipsoidField(x, y, z, 0.36, 0.86, -0.14, 0.3, 0.5, 0.28),
                    ellipsoidField(x, y, z, -0.36, 0.86, -0.14, 0.3, 0.5, 0.28),
                    ellipsoidField(x, y, z, 0.22, 0.8, 0.22, 0.26, 0.44, 0.24),
                    ellipsoidField(x, y, z, -0.22, 0.8, 0.22, 0.26, 0.44, 0.24),
                    ellipsoidField(x, y, z, 0, 0.92, -0.34, 0.34, 0.42, 0.28)
                ) * clear;
                const b = Math.pow(rows, 0.46);
                const knuckle = b * (0.84 + Math.abs(Math.sin((z + x) * 15)) * 0.22);
                addVec(out, nx * knuckle * 1.9 + x * knuckle * 0.5, knuckle * 1.18, nz * knuckle * 1.55, knuckle);
            } else if (primitive === 'fatSpikeGrid') {
                let b = Math.max(0, Math.cos(x * Math.PI * 5.2) * Math.sin((zNorm + 0.08) * Math.PI * 4.2) - 0.1);
                b = Math.pow(b, 1.18) * fullBand * smoothStep(0.68, 0.02, Math.abs(x));
                addVec(out, nx * b * 1.7, b * 2.35, nz * b * 1.7, b);
            } else {
                let b = Math.max(0, Math.cos(x * Math.PI * 2.5) * Math.sin(zNorm * Math.PI * 3.0) - 0.2);
                b = Math.pow(b, 1.5);
                addVec(out, nx * b, ny * b, nz * b, b);
            }

            return out;
        }

        function appendCatfishBarbelsToGeometry(geo, anchorCandidates, baseColor, accentColor) {
            const posAttr = geo.attributes.position;
            const colorAttr = geo.attributes.color;
            const indices = Array.from(geo.index.array);
            const positions = Array.from(posAttr.array);
            const colors = Array.from(colorAttr.array);
            const box = new THREE.Box3().setFromBufferAttribute(posAttr);
            const size = new THREE.Vector3();
            box.getSize(size);
            const unit = Math.max(0.42, Math.min(0.68, Math.min(size.x, size.z) * 0.28));
            const barbelColor = new THREE.Color(0x8a6f3a).lerp(accentColor, 0.28);
            const rootColor = baseColor.clone().lerp(accentColor, 0.34);
            const tubularSegments = 5;
            const radialSegments = 4;
            const rootRadius = 0.03;
            const tipRadius = 0.007;

            const chooseAnchorIndex = (sign) => {
                const candidates = anchorCandidates.get(sign) || [];
                if (!candidates.length) return -1;
                candidates.sort((a, b) => a.score - b.score);
                return candidates[0].idx;
            };

            const pushColor = (color) => {
                colors.push(color.r, color.g, color.b);
            };

            for (let sign of [1, -1]) {
                const anchorIndex = chooseAnchorIndex(sign);
                if (anchorIndex < 0) continue;
                const anchor = new THREE.Vector3(
                    posAttr.getX(anchorIndex),
                    posAttr.getY(anchorIndex),
                    posAttr.getZ(anchorIndex)
                );
                const specs = [
                    { side: 1.18, down: -0.1, forward: 0.58, curl: 0.12, lift: 0.04 },
                    { side: 1.0, down: -0.24, forward: 0.48, curl: -0.08, lift: -0.02 },
                    { side: 0.68, down: -0.38, forward: 0.3, curl: 0.06, lift: -0.08 }
                ];

                for (const spec of specs) {
                    const root = anchor.clone().add(new THREE.Vector3(sign * unit * 0.02, -unit * 0.01, unit * 0.02));
                    const mid = anchor.clone().add(new THREE.Vector3(sign * unit * spec.side * 0.48, unit * (spec.down * 0.52 + spec.lift), unit * spec.forward * 0.68));
                    const tip = anchor.clone().add(new THREE.Vector3(sign * unit * spec.side, unit * spec.down, unit * spec.forward + spec.curl * unit));
                    const curve = new THREE.CatmullRomCurve3([root, mid, tip]);
                    const tube = new THREE.TubeGeometry(curve, tubularSegments, rootRadius, radialSegments, false);
                    const tubePos = tube.attributes.position;
                    const ringSize = radialSegments + 1;
                    const offset = positions.length / 3;

                    for (let ring = 0; ring <= tubularSegments; ring++) {
                        const t = ring / tubularSegments;
                        const center = curve.getPointAt(t);
                        const taper = THREE.MathUtils.lerp(1, tipRadius / rootRadius, Math.pow(t, 0.72));
                        const color = rootColor.clone().lerp(barbelColor, smoothStep(0.0, 0.82, t));
                        for (let j = 0; j < ringSize; j++) {
                            const idx = ring * ringSize + j;
                            positions.push(
                                center.x + (tubePos.getX(idx) - center.x) * taper,
                                center.y + (tubePos.getY(idx) - center.y) * taper,
                                center.z + (tubePos.getZ(idx) - center.z) * taper
                            );
                            pushColor(color);
                        }
                    }

                    for (let i = 0; i < tube.index.count; i += 3) {
                        indices.push(offset + tube.index.getX(i), offset + tube.index.getX(i + 1), offset + tube.index.getX(i + 2));
                    }

                    for (let j = 0; j < radialSegments; j++) {
                        indices.push(anchorIndex, offset + j, offset + j + 1);
                    }

                    const tipCenterIndex = positions.length / 3;
                    positions.push(tip.x, tip.y, tip.z);
                    pushColor(barbelColor);
                    const tipRing = offset + tubularSegments * ringSize;
                    for (let j = 0; j < radialSegments; j++) {
                        indices.push(tipCenterIndex, tipRing + j + 1, tipRing + j);
                    }

                    tube.dispose();
                }
            }

            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geo.setIndex(indices);
            geo.computeBoundingBox();
            geo.computeBoundingSphere();
        }

        function addFeatureMarkers(group, cHd, cSd, accentColor) {

        // --- 万向张量核心方程 ---
        function applyTensorField(x, y, z, params, sign) {
            let cOx = sign * params.ox;
            let d = Math.hypot(x - cOx, y - params.oy, z - params.oz);
            if (d > params.rad) return { dx: 0, dy: 0, dz: 0, disp: 0 };

            let p = Math.max(0, 1.0 - d / params.rad);
            p = p * p * (3 - 2 * p); // C1 SmoothStep

            let ease = Math.pow(p, params.pow);
            let dx = 0, dy = 0, dz = 0;

            let localX = x - cOx;
            let localZ = z - params.oz;
            let twistAngle = ease * params.tw;
            
            let rotX = Math.cos(twistAngle)*localX - Math.sin(twistAngle)*localZ;
            let rotZ = Math.sin(twistAngle)*localX + Math.cos(twistAngle)*localZ;

            if (params.wv !== 0) {
                let waveDisp = Math.sin(Math.atan2(rotX, rotZ) * params.wv) * 0.2 * ease;
                dx += sign * rotX * waveDisp * 3.0; 
                dz += rotZ * waveDisp * 3.0;
            } else {
                dx += sign * (rotX - localX);
                dz += (rotZ - localZ);
            }

            dx += sign * ease * params.sx;
            dy += ease * params.sy;
            dz += ease * params.sz;

            if (params.sz < 0) {
                dz += localZ * ease * params.sz; 
            }

            if (params.dr !== 0) {
                dz -= Math.pow(ease, 1.8) * params.dr;
            }

            if (params.cav !== 0) {
                let frontMask = Math.max(0, 1.0 - Math.abs(localZ) / (params.rad * 0.6));
                frontMask = frontMask * frontMask * (3 - 2 * frontMask);
                dz -= Math.sin(ease * Math.PI) * params.cav * frontMask;
            }

            if (params.blb !== 0) {
                let tip = Math.pow(p, 6.0); 
                dx += sign * tip * params.blb;
                dy += tip * params.blb;
                dz += tip * params.blb;
            }

            return { dx, dy, dz, disp: p };
        }

        let currentGroup = null, floatWrapper = null, exportableModel = null; 

        function buildCreature() {
            if (currentGroup) { 
                scene.remove(currentGroup);

            }
            currentGroup = new THREE.Group(); floatWrapper = new THREE.Group(); currentGroup.add(floatWrapper);
            
            const cEl = currentDNA[0].join(''); const pal = PALETTES[cEl];
            const cSh = currentDNA[1].join(''); const shp = BODY_SHAPES[cSh];
            const cHd = currentDNA[2].join(''); const headParams = HEAD_TENSORS[cHd];
            const cSd = currentDNA[3].join(''); const sideParams = SIDE_TENSORS[cSd];
            const cBk = currentDNA[4].join(''); const backParams = BACK_TENSORS[cBk];
            const patId = PATTERNS[BASES.indexOf(currentDNA[5][0])*4 + BASES.indexOf(currentDNA[5][1])];
            const rand = seededRandom(hashString(`tensor-lab-v30:${dnaSignature()}`));

            const baseColor = new THREE.Color(pal.b[Math.floor(rand() * pal.b.length)]);
            const accentColor = new THREE.Color(pal.a[Math.floor(rand() * pal.a.length)]);

            document.body.style.background = `radial-gradient(circle at center, ${cEl==='GG'?'#1e293b':'#ffffff'}, ${pal.bg})`;
            document.getElementById('ui-layer').style.borderColor = pal.border;
            document.getElementById('stats-layer').style.borderColor = pal.border;
            document.getElementById('type-indicator').innerHTML = `<span style="color:${pal.border}">${pal.name}</span>`;

            const vinylMat = new THREE.MeshStandardMaterial({
                vertexColors: true, roughness: 0.75, metalness: 0.0, side: THREE.FrontSide, wireframe: isWireframeMode
            });

            // 3000 面预算保护：主体最多约 1.9k 面，剩余留给眼睛/鼻孔/内耳小 mesh。
            let wSegments = 40, hSegments = 24;
            if (cHd === 'AA' || cHd === 'CC' || cHd === 'GC' || cSd === 'CC' || cSd === 'AT' || cBk !== 'AA') {
                wSegments = 42; hSegments = 24;
            }
            
            const geo = new THREE.SphereGeometry(1.0, wSegments, hSegments); 
            let pos = geo.attributes.position;
            const colors = new Float32Array(pos.count * 3);
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const eyeOrigin = new THREE.Vector3(0.35, 0.15, 0.85);
            const blushOrigin = new THREE.Vector3(0.45, -0.05, 0.75);
            let leftEyeIdx = -1, rightEyeIdx = -1, leftEyeDist = 999, rightEyeDist = 999;
            const catfishAnchorCandidates = new Map([[1, []], [-1, []]]);

            for(let i=0; i<pos.count; i++) {
                let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                
                let dL = Math.hypot(x - eyeOrigin.x, y - eyeOrigin.y, z - eyeOrigin.z);
                if (dL < leftEyeDist) { leftEyeDist = dL; leftEyeIdx = i; }
                let dR = Math.hypot(x + eyeOrigin.x, y - eyeOrigin.y, z - eyeOrigin.z);
                if (dR < rightEyeDist) { rightEyeDist = dR; rightEyeIdx = i; }

                let nx = x, ny = y, nz = z; let zNorm = z; 
                
                let taper = 0.5 + (zNorm + 1.0) / 4.0;
                const bodyField = applyBodyBlueprint(x, y, z, cSh, shp, taper);
                let baseX = bodyField.x, baseY = bodyField.y, baseZ = bodyField.z;
                
                let disp = 0; 
                
                // 1. 头部语义蓝图：用不同轮廓程序替代统一拉伸参数。
                let headField = applyHeadBlueprint(x, y, z, cHd, headParams);
                baseX += headField.dx; baseY += headField.dy; baseZ += headField.dz; disp = Math.max(disp, headField.disp);

                if (cHd === 'CA' && z > 0.52 && y < 0.26 && y > -0.58) {
                    for (let sign of [1, -1]) {
                        if (sign * x < 0.02) continue;
                        const score = ((x - sign * 0.24) / 0.22) ** 2 + ((y + 0.13) / 0.32) ** 2 + ((z - 0.86) / 0.22) ** 2;
                        catfishAnchorCandidates.get(sign).push({ idx: i, score });
                    }
                }

                // 2. 侧翼语义蓝图：蝙蝠膜、蝴蝶瓣、叶片、螺旋侧角分开处理。
                let sideField = applySideBlueprint(x, y, z, cSd, sideParams, cHd);
                baseX += sideField.dx; baseY += sideField.dy; baseZ += sideField.dz; disp = Math.max(disp, sideField.disp);

                // 3. 背部语义蓝图：补齐原先共用 generic spike 的背部类型差异。
                let backField = applyBackBlueprint(x, y, z, baseY, cBk, backParams, nx, ny, nz, zNorm, cHd);
                baseX += backField.dx; baseY += backField.dy; baseZ += backField.dz; disp = Math.max(disp, backField.disp);

                // 底盘压平：所有语义形态共享同一地板约束，避免象鼻/侧翼穿透平面。
                let bottomLimit = -0.3;
                if (baseY < bottomLimit) {
                    let squash = bottomLimit - baseY;
                    baseY = bottomLimit;
                    baseX += squash * 0.8 * baseX; 
                    baseZ += squash * 0.4 * baseZ;
                }

                pos.setXYZ(i, baseX, baseY, baseZ);

                // --- 染色逻辑 ---
                let cMix = smoothStep(0.1, 0.7, disp);
                let r = THREE.MathUtils.lerp(baseColor.r, accentColor.r, cMix);
                let g = THREE.MathUtils.lerp(baseColor.g, accentColor.g, cMix);
                let b = THREE.MathUtils.lerp(baseColor.b, accentColor.b, cMix);
                
                const patternStrength = smoothStep(0.72, 0.25, disp);
                if (patId === 'polka_dots' && patternStrength > 0.45) {
                    if (Math.sin(x*5) * Math.cos(z*5) > 0.6) { r=accentColor.r; g=accentColor.g; b=accentColor.b; }
                } else if (patId === 'stripes' && patternStrength > 0.45) {
                    if (Math.sin(x*8 + z*8) > 0.5) { r=accentColor.r; g=accentColor.g; b=accentColor.b; }
                } else if (patId === 'voronoi' && patternStrength > 0.45) {
                    if (Math.sin(x*10) * Math.sin(y*10) * Math.sin(z*10) > 0.2) { r=accentColor.r; g=accentColor.g; b=accentColor.b; }
                } else if (patId === 'zebra' && patternStrength > 0.45) {
                    if (Math.sin(x*15 + Math.sin(z*5)*5) > 0.5) { r=accentColor.r; g=accentColor.g; b=accentColor.b; }
                } else if (patId === 'gradient') {
                    let grad = smoothStep(-1.0, 1.0, z);
                    r = THREE.MathUtils.lerp(r, accentColor.r, grad * patternStrength);
                    g = THREE.MathUtils.lerp(g, accentColor.g, grad * patternStrength);
                    b = THREE.MathUtils.lerp(b, accentColor.b, grad * patternStrength);
                }

                if (cHd === 'CA') {
                    let whiskerRoot = 0;
                    let whiskerLine = 0;
                    for (let sign of [1, -1]) {
                        for (const strandSpec of CATFISH_BARBEL_FIELDS) {
                            const q = ellipsoidField(x, y, z, sign * strandSpec.cx, strandSpec.oy, strandSpec.oz, strandSpec.rx * 1.06, strandSpec.ry * 1.08, strandSpec.rz * 1.05);
                            if (q <= 0) continue;
                            const rib = Math.abs(Math.sin((y - strandSpec.oy) * 34 + (z - strandSpec.oz) * 13 + strandSpec.phase)) * Math.pow(q, 1.2);
                            whiskerRoot = Math.max(whiskerRoot, q);
                            whiskerLine = Math.max(whiskerLine, rib);
                        }
                    }
                    if (whiskerRoot > 0) {
                        const softTint = Math.min(0.28, Math.pow(whiskerRoot, 1.25) * 0.28);
                        const lineTint = Math.min(0.42, whiskerLine * 0.42);
                        r = THREE.MathUtils.lerp(r, baseColor.r * 0.72 + accentColor.r * 0.28, softTint);
                        g = THREE.MathUtils.lerp(g, baseColor.g * 0.72 + accentColor.g * 0.28, softTint);
                        b = THREE.MathUtils.lerp(b, baseColor.b * 0.72 + accentColor.b * 0.28, softTint);
                        r = THREE.MathUtils.lerp(r, accentColor.r, lineTint);
                        g = THREE.MathUtils.lerp(g, accentColor.g, lineTint);
                        b = THREE.MathUtils.lerp(b, accentColor.b, lineTint);
                    }
                }
                
                let dB = Math.min(Math.hypot(x-blushOrigin.x, y-blushOrigin.y, z-blushOrigin.z), Math.hypot(x+blushOrigin.x, y-blushOrigin.y, z-blushOrigin.z));
                let bMix = Math.max(0, 1.0 - dB/0.25);
                if (bMix > 0) { r += (0.95-r)*bMix; g += (0.3-g)*bMix; b += (0.5-b)*bMix; }
                
                colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
            }

            if (cHd === 'CA') {
                appendCatfishBarbelsToGeometry(geo, catfishAnchorCandidates, baseColor, accentColor);
                pos = geo.attributes.position;
            }

            // Catfish barbels append vertices to the shared BufferGeometry. The original
            // SphereGeometry normal attribute is now too short, so recreate it before drawing.
            geo.deleteAttribute('normal');
            geo.computeVertexNormals();
            const toyMesh = new THREE.Mesh(geo, vinylMat); toyMesh.castShadow = true; floatWrapper.add(toyMesh);

            const eyeMat = new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.1, metalness: 0.3, wireframe: isWireframeMode});
            const hlMat = new THREE.MeshBasicMaterial({color: 0xffffff});
            
            const eyeGeo = new THREE.SphereGeometry(0.12, 10, 10); eyeGeo.scale(0.8, 1.25, 0.5); 
            const eyeGroup = new THREE.Group(); 
            eyeGroup.add(new THREE.Mesh(eyeGeo, eyeMat));
            const hl1 = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), hlMat); hl1.position.set(0.03, 0.06, 0.045); eyeGroup.add(hl1);
            const hl2 = new THREE.Mesh(new THREE.SphereGeometry(0.015, 6, 6), hlMat); hl2.position.set(-0.03, -0.05, 0.045); eyeGroup.add(hl2);

            [leftEyeIdx, rightEyeIdx].forEach((idx) => {
                let p = new THREE.Vector3(pos.getX(idx), pos.getY(idx), pos.getZ(idx)), n = new THREE.Vector3(geo.attributes.normal.getX(idx), geo.attributes.normal.getY(idx), geo.attributes.normal.getZ(idx));
                const e = eyeGroup.clone(); e.position.copy(p); e.lookAt(p.clone().add(n)); e.position.addScaledVector(n, -0.01); floatWrapper.add(e);
            });

            addFeatureMarkers(floatWrapper, cHd, cSd, accentColor);

            const shadowMesh = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0 }));
            shadowMesh.rotation.x = -Math.PI/2; shadowMesh.position.y = -0.32; shadowMesh.receiveShadow=true; currentGroup.add(shadowMesh);
            scene.add(currentGroup);
            
            exportableModel = floatWrapper;

            let faceCount = 0;
            floatWrapper.traverse((c) => { if (c.isMesh && c.geometry) faceCount += (c.geometry.index ? c.geometry.index.count : c.geometry.attributes.position.count) / 3; });
            document.getElementById('poly-count').innerText = faceCount.toLocaleString() + " 面 (智能自适应)";
        }

        document.getElementById('btn-wireframe').addEventListener('click', function() {
            isWireframeMode = !isWireframeMode;
            this.classList.toggle('active', isWireframeMode);
            this.innerText = isWireframeMode ? "💎 返回材质模式" : "🕸️ 拓扑剖析";
            buildCreature(); 
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            if (!exportableModel) return;
            const exportGroup = new THREE.Group();
            exportableModel.children.forEach(child => {
                if (child.isMesh || child.isGroup) {
                    const clonedChild = child.clone(true); 
                    if(clonedChild.material && clonedChild.material.vertexColors) clonedChild.material.needsUpdate = true;
                    exportGroup.add(clonedChild);
                }
            });
            exportGroup.position.set(0,0,0); exportGroup.rotation.set(0,0,0); exportGroup.scale.set(1,1,1);
            
            new GLTFExporter().parse(exportGroup, (gltf) => {
                const zip = new JSZip();
                zip.file("Universal_Tensor_Asset.glb", gltf);
                zip.generateAsync({type:"blob"}).then(blob => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Universal_Tensor_Asset.zip"; a.click();
                });
            }, function ( error ) { console.error('导出失败:', error); }, { binary: true });
        });

        function renderUI() {
            const board = document.getElementById('dna-board'); board.innerHTML = '';
            currentDNA.forEach((gene, idx) => {
                const block = document.createElement('div'); block.className = 'gene-block';
                const code = gene.join('');
                const traitName = getTraitName(idx, code);
                if (idx === 2) block.title = `视觉合同: ${getHeadContract(code).firstRead}`;

                block.innerHTML = `
                    <div class="gene-label">${GENE_NAMES[idx]}</div>
                    <div class="base-pairs"></div>
                    <div class="trait-name">${traitName}</div>
                `;
                gene.forEach((base, bIdx) => {
                    const btn = document.createElement('div'); btn.className = `base base-${base}`; btn.innerText = base;
                    btn.onclick = () => { currentDNA[idx][bIdx] = BASES[(BASES.indexOf(base)+1)%4]; renderUI(); triggerMutation(); };
                    block.querySelector('.base-pairs').appendChild(btn);
                });
                board.appendChild(block);
            });
        }

        function getTraitName(idx, code) {
            if(idx===0) return PALETTES[code].name;
            if(idx===1) return BODY_SHAPES[code].n;
            if(idx===2) return HEAD_TENSORS[code].n;
            if(idx===3) return SIDE_TENSORS[code].n;
            if(idx===4) return BACK_TENSORS[code].n;
            if(idx===5) return PATTERNS[BASES.indexOf(code[0])*4+BASES.indexOf(code[1])];
            return code;
        }

        function normalizeDNACodes(codes) {
            if (!Array.isArray(codes) || codes.length !== currentDNA.length) throw new Error('DNA must contain 6 two-base codes.');
            return codes.map(code => {
                if (!DNA_CODES.includes(code)) throw new Error(`Invalid DNA code: ${code}`);
                return [code[0], code[1]];
            });
        }

        function setDNAFromCodes(codes, options = {}) {
            currentDNA = normalizeDNACodes(codes);
            renderUI();
            if (options.immediate === false) triggerMutation();
            else buildCreature();
        }

        function setCameraView(view) {
            const target = new THREE.Vector3(0, 0.35, 0.2);
            const views = {
                front: new THREE.Vector3(0, 3.0, 8.2),
                side: new THREE.Vector3(8.2, 3.0, 0.15),
                top: new THREE.Vector3(0.01, 8.8, 0.2),
                iso: new THREE.Vector3(7.5, 5.5, 8.5)
            };
            camera.position.copy(views[view] || views.iso);
            controls.target.copy(target);
            camera.lookAt(target);
            controls.update();
            renderer.render(scene, camera);
        }

        window.TensorLab = {
            setDNA: (codes) => setDNAFromCodes(codes),
            setCameraView,
            getState: () => ({
                dna: dnaSignature(),
                traits: currentDNA.map((gene, idx) => getTraitName(idx, gene.join(''))),
                polyCount: document.getElementById('poly-count').innerText
            }),
            codes: { dna: DNA_CODES, head: Object.keys(HEAD_TENSORS), side: Object.keys(SIDE_TENSORS), dorsal: Object.keys(BACK_TENSORS) },
            contracts: { head: HEAD_CONTRACTS },
            primitives: { head: HEAD_PRIMITIVES, side: SIDE_PRIMITIVES, dorsal: DORSAL_PRIMITIVES }
        };

        function triggerMutation() {
            const loading = document.getElementById('loading');
            loading.style.opacity = 1;
            setTimeout(() => {
                try {
                    buildCreature();
                } catch (error) {
                    console.error('生成失败:', error);
                } finally {
                    loading.style.opacity = 0;
                }
            }, 50);
        }
        document.getElementById('btn-randomize').addEventListener('click', () => {
            const randomCodes = currentDNA.map(() => BASES[Math.floor(Math.random()*4)] + BASES[Math.floor(Math.random()*4)]);
            setDNAFromCodes(randomCodes, { immediate: false });
        });

        renderUI(); triggerMutation();
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if(floatWrapper) {
                let t = clock.getElapsedTime();
                floatWrapper.position.y = 0;
                floatWrapper.scale.set(1.0 + Math.cos(t * 4.0) * 0.02, 1.0 + Math.cos(t * 4.0) * 0.03, 1.0 + Math.sin(t * 4.0) * 0.04);
                floatWrapper.rotation.y = Math.sin(t * 2.0) * 0.05;
            }
            controls.update(); renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
