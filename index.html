<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黏兽基因实验室</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">基因序列解码中...</div>
    <div id="death-toast" class="death-toast"></div>

    <div id="game-container">
        <div id="canvas-container"></div>

        <!-- 顶部HUD -->
        <div id="top-hud">
            <div class="hud-title">小黏兽基因实验室</div>
            <div class="hud-right">
                <div class="hud-item hud-rp">🔬<span id="rp-amount">0</span></div>
                <div class="hud-item hud-catalyst">🧪<span id="catalyst-count">0</span></div>
                <div class="hud-item hud-coin"><span id="coin-amount">120</span>g</div>
                <button class="btn-buy-wild" id="btn-skip-day" onclick="doSkipDay()">⏭ 跳过今天</button>
            </div>
        </div>

        <!-- 岛屿导航 -->
        <div id="island-nav-left" class="island-nav" onclick="switchIsland('prev')">◀</div>
        <div id="island-nav-right" class="island-nav" onclick="switchIsland('next')">▶</div>
        <div id="island-name">🧪 实验室</div>

        <!-- 左侧纸质属性面板 -->
        <div id="creature-panel" class="hidden">
            <div class="paper-card" id="paper-card-content"></div>
        </div>
    </div>

    <!-- 战斗场景 -->
    <div id="battle-arena">
        <canvas id="battle-canvas"></canvas>
        <div class="bhud-top">
            <div class="bhud-team" id="bhud-team-p"></div>
            <div class="bhud-team" id="bhud-team-n" style="align-items:flex-end;"></div>
        </div>
        <div class="bhud-center" id="bhud-center"></div>
        <div class="bhud-log" id="bhud-log"></div>
        <div class="deploy-panel" id="deploy-panel" style="display:none;"></div>
        <div class="battle-controls" id="battle-controls" style="display:none;">
            <button id="btn-pause" onclick="toggleBattlePause()">⏸</button>
            <button id="btn-speed1" class="active" onclick="setBattleSpeed(1)">1x</button>
            <button id="btn-speed2" onclick="setBattleSpeed(2)">2x</button>
            <button id="btn-speed3" onclick="setBattleSpeed(3)">3x</button>
            <div class="round-indicator" id="round-indicator">第 1 回合</div>
        </div>
    </div>

    <!-- Overlays -->
    <div id="reveal-overlay">
        <div class="reveal-title" id="reveal-title">新生命诞生!</div>
        <div class="reveal-genes" id="reveal-genes"></div>
        <div class="reveal-value" id="reveal-value-display"></div>
        <div class="reveal-sub" id="reveal-sub"></div>
        <button class="btn-collect" id="btn-collect">收入库存</button>
    </div>

    <div id="arena-overlay">
        <div class="arena-panel" id="arena-panel-content"></div>
    </div>

    <div id="upgrade-overlay">
        <div class="upgrade-panel" id="upgrade-panel-content"></div>
    </div>

    <script type="module" src="src/main.mjs?v=14"></script>
</body>
</html>
